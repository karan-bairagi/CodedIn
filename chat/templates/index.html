<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeIn</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/thumb/1/18/C_Programming_Language.svg/960px-C_Programming_Language.svg.png?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=thumbnail&_=20201031132917">
</head>
<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
html,body{
    width:100%;
    height:100%;
    font-family:'Segoe UI',sans-serif;
    background:#f4f6f9;
    overflow:hidden;
}
body{
    display:flex;
}
.app-container{
    width:100%;
    height:100vh;
    display:flex;
    overflow:hidden;
}
.sidebar{
    width:340px;
    min-width:340px;
    background:#ffffff;
    border-right:1px solid #e5e7eb;
    display:flex;
    flex-direction:column;
}
.brand{
    padding:24px;
    border-bottom:1px solid #edf2f7;
}
.brand h2{
    color:#3182ce;
    font-size:42px;
    font-weight:800;
}
.search-wrapper{
    position:relative;
    padding:18px;
}
.search-wrapper input{
    width:100%;
    height:58px;
    border:none;
    outline:none;
    background:#eef2f7;
    border-radius:16px;
    padding:0 18px;
    font-size:16px;
}
.search-wrapper input:focus{
    border:2px solid #3182ce;
}
.search-results-box{
    position:absolute;
    top:88px;
    left:18px;
    right:18px;
    background:#fff;
    border-radius:16px;
    box-shadow:0 12px 30px rgba(0,0,0,.12);
    overflow-y:auto;
    max-height:350px;
    display:none;
    z-index:999;
}
.search-user-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 15px;
    cursor: pointer;
}
.search-user-avatar {
    width: 55px;          
    height: 55px;         
    border-radius: 50%;  
    object-fit: cover;  
    object-position: top; 
    flex-shrink: 0;      
}
.search-user-initial {
    width: 55px;                  
    height: 55px;                
    border-radius: 50%;           
    background-color: #3182ce;    
    color: #ffffff;               
    display: flex;               
    align-items: center;          
    justify-content: center;       
    font-size: 22px;         
    font-weight: bold;            
    flex-shrink: 0; 
}
.search-user-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
}
#search_user_with_chat{
    display:flex;
    flex-direction:column;
    gap:8px;
    padding:10px;
}
.search-user-card{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px;
    border-radius:14px;
    cursor:pointer;
    transition:.25s;
}
.search-user-card:hover{
    background:#f1f5f9;
}
.search-user-avatar,
.user-avatar{
    width:55px;
    height:55px;
    border-radius:50%;
    object-fit:cover;
    flex-shrink:0;
}
.search-user-initial,
.profile-circle{
    width:55px;
    height:55px;
    border-radius:50%;
    background:#3182ce;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    font-weight:700;
    flex-shrink:0;
}
.search-user-info{
    flex:1;
}
.search-user-name{
    font-size:16px;
    font-weight:600;
    color:#111827;
}
.search-user-fullname{
    font-size:13px;
    color:#94a3b8;
    margin-top:2px;
}
#not-found{
    text-align:center;
    padding:15px;
    color:#64748b;
}
.user-avatar {
    width: 60px;          
    height: 60px;    
    border-radius: 50%;   
    object-fit: cover;   
    object-position: top; 
    display: block;    
}
.avatar-container {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}
.recent-title{
    padding:0 20px 12px;
    font-size:12px;
    letter-spacing:2px;
    color:#94a3b8;
    font-weight:700;
}
#inbox-box{
    flex:1;
    overflow-y:auto;
    padding:0 14px 14px;
}
#inbox-users{
    display:flex;
    flex-direction:column;
    gap:12px;
}
.inbox-user-card{
    display:flex;
    align-items:center;
    gap:14px;
    background:#fff;
    border:1px solid #e5e7eb;
    border-radius:18px;
    padding:15px;
    cursor:pointer;
    transition:.25s;
}
.inbox-user-card:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}
.inbox-user-card.active-chat{
    border:2px solid #3182ce;
    background:#eff6ff;
}
.user-info{
    flex:1;
}
.user-name{
    font-size:20px;
    font-weight:600;
    color:#111827;
}
.user-subtext{
    color:#94a3b8;
    margin-top:4px;
    font-size:14px;
}
.chat-area{
    flex:1;
    display:flex;
    flex-direction:column;
    background:#f8fafc;
}
.chat-header{
    height:90px;
    background:#fff;
    border-bottom:1px solid #e5e7eb;
    display:flex;
    align-items:center;
    gap:15px;
    padding:0 20px;
    flex-shrink:0;
}
#header-avatar-box {
    width: 50px; 
    height: 50px;
    flex-shrink: 0 !important;
    border-radius: 50%;
}

#header-avatar-box img {
    width: 100%;
    height: 100%;
    object-fit: cover !important; 
    flex-shrink: 0 !important;
    border-radius: 50%;
}

.header-info{
    flex:1;
}
.header-info h3{
    font-size:22px;
    color:#111827;
}
.header-info p{
    color:#64748b;
    margin-top:3px;
}
.chat-body{
    flex:1;
    overflow-y:auto;
    padding:20px;
    background:#f8fafc;
}
.empty-chat{
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:#94a3b8;
}
.empty-chat h1{
    margin-bottom:10px;
}
#typing-status{
    padding:10px 20px;
    background:#fff;
    display:none;
    align-items:center;
    gap:10px;
}
.typing-bubble{
    display:flex;
    gap:5px;
}
.typing-bubble span{
    width:8px;
    height:8px;
    background:#3182ce;
    border-radius:50%;
    animation:bounce 1s infinite;
}
.typing-bubble span:nth-child(2){
    animation-delay:.2s;
}
.typing-bubble span:nth-child(3){
    animation-delay:.4s;
}
@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-5px);
    }
}
.chat-footer{
    background:#fff;
    border-top:1px solid #e5e7eb;
    padding:14px;
    display:flex;
    gap:10px;
    flex-shrink:0;
}
.chat-footer input{
    flex:1;
    height:58px;
    border:none;
    outline:none;
    background:#eef2f7;
    border-radius:40px;
    padding:0 20px;
    font-size:16px;
}
.send-btn{
    width:58px;
    height:58px;
    border:none;
    border-radius:50%;
    background:#3182ce;
    color:white;
    cursor:pointer;
    font-size:22px;
}
.send-btn:hover{
    transform:scale(1.05);
}
.mobile-back{
    display:none;
    border:none;
    background:none;
    font-size:18px;
    cursor:pointer;
}

::-webkit-scrollbar{
    width:6px;
}
::-webkit-scrollbar-thumb{
    background:#cbd5e1;
    border-radius:20px;
}
@media(max-width:768px){

    .sidebar{
        width:100%;
        min-width:100%;
    }

    .chat-area{
        position:fixed;
        inset:0;
        background:#fff;
        display:none;
        z-index:1000;
    }

    .chat-area.active{
        display:flex;
    }

    .sidebar.hide{
        display:none;
    }

    .mobile-back{
        display:block;
    }

    .brand h2{
        font-size:34px;
    }

    .header-info h3{
        font-size:18px;
    }

    .user-name{
        font-size:17px;
    }

    .chat-footer input{
        font-size:15px;
    }

    #header-avatar-box{
        width:50px;
        height:50px;
    }
}
.msg-container-hover:hover .msg-menu-btn {
    display: block !important;
}
.msg-menu-btn:hover {
    background-color: #edf2f7;
    border-radius: 50%;
    color: #1a202c !important;
}
.date-divider{
    display:flex;
    justify-content:center;
    margin:20px 0;
}
.date-divider span{
    background:#e2e8f0;
    color:#64748b;
    padding:6px 14px;
    border-radius:20px;
    font-size:12px;
    font-weight:600;
}
.my-message{
    width:100%;
    display:flex;
    justify-content:flex-end;
    margin-bottom:14px;
}
.my-message > div{
    max-width:70%;
}
.my-bubble{
    background:#2f80ed;
    color:#fff;
    padding:12px 16px;
    border-radius:18px 18px 4px 18px;
    font-size:15px;
    line-height:1.5;
    word-break:break-word;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}
.loader-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(255, 255, 255, 0.8); 
    backdrop-filter: blur(4px); 
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999; 
}
.spinner {
    width: 50px;
    height: 50px;
    border: 5px solid #e2e8f0;
    border-top: 5px solid #2563eb; 
    border-radius: 50%;
    animation: spin 1s linear infinite;
}
.loader-text {
    margin-top: 15px;
    font-size: 16px;
    font-weight: 600;
    color: #1e293b;
    font-family: sans-serif;
}
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
@media (max-width: 768px) {
    .spinner {
        width: 40px;
        height: 40px;
        border-width: 4px;
    }
    .loader-text {
        font-size: 14px;
    }
}

.other-message{
    width:100%;
    display:flex;
    justify-content:flex-start;
    margin-bottom:14px;
}
.other-message > div{
    max-width:70%;
}
.other-bubble{
    background: #f1f0f0;
    color: #333333;
    padding:12px 16px;

    font-size:15px;
    line-height:1.5;

}
.msg-time{
    font-size:11px;
    color:#94a3b8;
    margin-top:4px;
    padding:0 4px;
}
.my-message .msg-time{
    text-align:right;
}
.other-message .msg-time{

.chat-body{

    overflow-y:auto;

}
.msg-container-hover:hover .msg-menu-btn {

#header-avatar{

    height:60px;
    border-radius:50%;
    overflow:hidden;
    background:#3182ce;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    font-weight:bold;

}
#header-avatar img{

    height:100%;

}

    transform: translateY(-50%);

    height: 18px;

.mic-active {

    animation: pulse-mic 1s infinite alternate;
}

@keyframes pulse-mic {
    0% { transform: scale(1); opacity: 0.6; }

</style>

<script>
    window.onload=function(){
        Inbox();

front_user_profile = null;
global_socket = null;
current_online_users = null;
let offlineTimers = {}; 
global_socket = new WebSocket('wss://' + window.location.host + '/Global_Online/');
global_socket.onopen = function() {
};
global_socket.onmessage = function(event) {
    global_data = JSON.parse(event.data);
    action = global_data['action'];
    online_username = global_data['username'];
    global_online_users = global_data['already_online_users'];
    if (global_online_users) {
        current_online_users = global_online_users;
    }

    let statusBox = document.getElementById('user-status');
    if (action === 'user_online' && online_username != login_username) {
        if (offlineTimers[online_username]) {
            clearTimeout(offlineTimers[online_username]);
            delete offlineTimers[online_username];
        }
        if (current_online_users && !current_online_users.includes(online_username)) {
            current_online_users.push(online_username);
        }
        let userCard = document.getElementById(`user-${online_username}`);
        if (userCard) {
            let subtext = userCard.querySelector('.user-subtext');
            if (subtext) {
                subtext.innerHTML = `<span style="color: #22c55e; font-weight: 600;">🟢 Active</span>`;
            }
        }
        if (statusBox && online_username === current_opened_chat_user) {
            statusBox.innerHTML = '🟢 Active Now';
        }
    }
    if (action === 'user_offline') {
        if (offlineTimers[online_username]) {
            clearTimeout(offlineTimers[online_username]);
        }

        offlineTimers[online_username] = setTimeout(function() {
            
            if (current_online_users) {
                current_online_users = current_online_users.filter(u => u !== online_username);
            }
            let userCard = document.getElementById(`user-${online_username}`);
            if (userCard) {
                let subtext = userCard.querySelector('.user-subtext');
                if (subtext) {
                    subtext.innerHTML = `<span style="color: #64748b;">⚫ Offline</span>`;
                }
            }
            if (statusBox && online_username === current_opened_chat_user) {
                statusBox.innerHTML = '⚫ Offline';
            }
            delete offlineTimers[online_username];

        }, 5000);
    }

    if (current_online_users && Array.isArray(current_online_users)) {
        current_online_users.forEach(username => {
            if (!offlineTimers[username]) {
                let userCard = document.getElementById(`user-${username}`);
                if (userCard) {
                    let subtext = userCard.querySelector('.user-subtext');
                    if (subtext) {
                        subtext.innerHTML = `<span style="color: #22c55e; font-weight: 600;">🟢 Active</span>`;
                    }
                }
            }
        });
    }
};
global_socket.onclose = function(event) {

};
let login_username=null;
let front_username=null;
let searchtimer;
function Search(){
    let user_input = document.getElementById('user_input').value.trim();
    let searchs_users = document.getElementById('search_user_with_chat');
    let not_found = document.getElementById('not-found');
    let result_box = document.getElementById('search-results-box');
    not_found.innerText = '';
    searchs_users.innerHTML = '';
    if(user_input === ''){
        result_box.style.display = 'none';
        return;
    }
    clearTimeout(searchtimer);
    searchtimer = setTimeout(async function(){
        let current_searches =
        document.getElementById('user_input').value.trim();
        if(current_searches === ''){
            searchs_users.innerHTML = '';
            not_found.innerText = '';
            result_box.style.display = 'none';
            return;
        }
        document.getElementById("search-loader").style.display = "block";
        let response = await fetch(
            '/chat_user_search/?q=' + current_searches,
            {
                method:'GET',
                headers:{
                    'Content-Type':'application/json'
                },
                credentials:'include'
            }
        );
        let data = await response.json();
        document.getElementById("search-loader").style.display = "none";
        searchs_users.innerHTML = '';
        not_found.innerText = '';
        if(response.status === 200){
            result_box.style.display = 'block';
            let html = '';
            for(let users of data.detail){
                html += `
                <div class="search-user-card"
                     onclick="open_chat(
                        null,
                        '${users.id}',
                        '${users.username}',
                        '${users.profile || ''}',
                        this
                     )">
                    ${
                        users.profile
                        ?
                        `<img src="${users.profile}"
                              class="search-user-avatar">`
                        :
                        `<div class="search-user-initial">
                            ${users.username.charAt(0).toUpperCase()}
                        </div>`
                    }
                    <div class="search-user-info">

                        <div class="search-user-name">
                            ${users.username}
                        </div>

                        <div class="search-user-fullname">
                            ${users.full_name || 'Click to open chat'}
                        </div>
                    </div>
                </div>
                `;
            }
            searchs_users.innerHTML = html;
        }
        else if(response.status === 404){
            result_box.style.display = 'block';
            not_found.innerText = 'No terminal found';
        }
    },500);
}
async function Inbox(){
    document.querySelector('.loader-text').innerText = "Fetching your inbox...";
    document.getElementById('global-loader').style.display = 'flex';

    let inbox_users = document.getElementById('inbox-users');
    inbox_users.innerHTML = '';
    let response = await fetch('/inbox/',{
        method:'GET',
        headers:{
            'Content-Type':'application/json'
        },
        credentials:'include'
    });
    let data = await response.json();
    if(response.status === 200){
        login_username = data.login_username;
        let html = '';
        for(let users of data.detail){
            if(users.username === login_username){
                continue;
            }
            html += `
            <div class="inbox-user-card"
                 id="user-${users.username}"
                 onclick="open_chat(
                    '${users.room_id}',
                    null,
                    '${users.username}',
                    '${users.profile || ''}',
                    this
                 )">

                <div class="avatar-container">

                    ${
                        users.profile
                        ?
                        `<img
                            src="${users.profile}"
                            alt="${users.username}"
                            class="user-avatar">`
                        :
                        `<div class="profile-circle">
                            ${users.username.charAt(0).toUpperCase()}
                        </div>`
                    }

                </div>

                <div class="user-info">

                    <h4 class="user-name">
                        ${users.username}
                    </h4>

                    <p class="user-subtext">
                        Click to open chat
                    </p>

                </div>

            </div>
            `;
        }
        inbox_users.innerHTML = html;
    }else{
    }
    document.getElementById('global-loader').style.display = 'none';
    document.querySelector('.loader-text').innerText = "";
}
window.addEventListener('DOMContentLoaded', (event) => {
    const urlParams = new URLSearchParams(window.location.search);
    
    const targetId = urlParams.get('open_id');
    const targetName = urlParams.get('open_name');
    const targetImg = urlParams.get('open_img');
    if (targetId && targetName && targetImg) {
        open_chat(null,targetId, targetName, targetImg); 
    }
});

let socket = null;
let current_opened_chat_user = null; 
async function open_chat(
    room_id,
    tartget_user_id,
    username,
    profile,
    clickedCard = null
){
    document.querySelector('.loader-text').innerText = "Opening secure chat...";
    document.getElementById('global-loader').style.display = 'flex';

    let respe=await fetch(`/message_read/${room_id}/`,{
        'method':'POST',
        'headers':{
            'Content-Type':'application/json',
        },

async function connectsocket(room_id){

        console.log('Websocket Connected Successfully')

        const typingStatus = document.getElementById('typing-status');

            let type_user=json_data['type_user']
            if(type_user!==login_username){
                typingStatus.style.display = 'block';
                new_chats.scrollTop = new_chats.scrollHeight;
            }
        }
        else if(action==='typing_stop'){
            typingStatus.style.display = 'none';
            return; 
        }

            let targetId = json_data['msg_id'];
            let msgElement = document.getElementById(`msg-${targetId}`);

                    <span style="background-color: #f0f2f5; color: #666666; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; font-family: -apple-system, sans-serif; box-shadow: 0 1px 1px rgba(0,0,0,0.05);">
                        ${msgDateStr}

                            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>

    }
    socket.send(JSON.stringify({
        'message':msg,
    }))
    input_box.value=''
}

function toggleDropdown(event, msgId) {
    event.stopPropagation(); 
    document.querySelectorAll('.msg-dropdown-box').forEach(box => {
        if(box.id !== `dropdown-${msgId}`) box.style.display = 'none';
    });
    let dropdown = document.getElementById(`dropdown-${msgId}`);
    if (dropdown) {
        if (dropdown.style.display === 'none' || dropdown.style.display === '') {
            dropdown.style.display = 'block';
        } else {
            dropdown.style.display = 'none';
        }
    }
}
document.addEventListener('click', function() {
    document.querySelectorAll('.msg-dropdown-box').forEach(box => {
        box.style.display = 'none';
    });
});
let pressTimer;
document.addEventListener('touchstart', function(e) {
    if (e.target.classList.contains('msg-bubble-main')) {
        let msgId = e.target.getAttribute('data-msgid');
        pressTimer = window.setTimeout(function() {
            triggerDeleteProcess(msgId);
        }, 800); 
    }
});
document.addEventListener('touchend', function() {
    clearTimeout(pressTimer);
});
function triggerDeleteProcess(msgId) {
    let confirmDelete = confirm("Are you sure you want to delete this message?");
    if (confirmDelete) {
        let targetMsgNode = document.getElementById(`msg-${msgId}`);
        if(targetMsgNode) {
            targetMsgNode.remove();
        }
    }
}

async function SpeakFunction() {
   const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
   let recognition = new SpeechRecognition();
   
   recognition.lang = 'en-IN';
   const inputField = document.getElementById('input-box');
   const micBtn = document.getElementById('mic-btn');
   micBtn.style.color = "red";
   inputField.placeholder = "🎙️ Listening... Speak now"; 
   inputField.value = "";
   recognition.start();
   recognition.onresult = function(event) {
       const speechtext = event.results[0][0].transcript;
       inputField.value = speechtext;
   }
   recognition.onend = function() {
       micBtn.style.color = "";
       inputField.placeholder = "Type a message...";
   }
}
