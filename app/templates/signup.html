<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeIn</title>
    <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/thumb/1/18/C_Programming_Language.svg/960px-C_Programming_Language.svg.png?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=thumbnail&_=20201031132917">
    <style>
        :root {
            --primary: #0a66c2;
            --primary-hover: #004182;
            --bg-surface: #ffffff;
            --bg-global: #f4f7fb;
            --text-main: #111827;
            --text-muted: #4b5563;
            --border-color: #e8edf3;
            --error-color: #f43f5e;
        }
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: var(--bg-global);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            box-sizing: border-box;
        }
        .auth-card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 40px 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-header h1 {
            margin: 0;
            color: var(--primary);
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .auth-header p {
            margin: 8px 0 0 0;
            color: var(--text-muted);
            font-size: 15px;
        }
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 15px;
            color: var(--text-main);
            background-color: #fafbfc;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: var(--bg-surface);
            box-shadow: 0 0 0 4px rgba(10, 102, 194, 0.1);
        }
        .error-message {
            color: var(--error-color);
            font-size: 13px;
            font-weight: 500;
            margin: 6px 0 0 0;
            display: flex;
            align-items: center;
        }
        .btn-submit {
            width: 100%;
            background-color: var(--primary);
            color: #ffffff;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(10, 102, 194, 0.15);
        }
        .btn-submit:hover {
            background-color: var(--primary-hover);
        }
        .btn-submit:active {
            transform: scale(0.98);
        }
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            margin-left: 4px;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        @media (max-width: 480px) {
            body {
                background-color: var(--bg-surface);
                display: block;
            }
            .auth-card {
                border: none;
                box-shadow: none;
                padding: 30px 10px;
            }
            .auth-header {
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">      
            <div class="auth-header">
                <h1>CodeIn</h1>
                <p>Join the community of elite developers</p>
            </div>
            <form action="" method="POST" novalidate>
                {% csrf_token %}
                {% for field in f %}
                <div class="form-group">
                    {{ field }}
                    {% if field.errors %}
                        {% for error in field.errors %}
                        <p class="error-message">⚠️ {{ error }}</p>
                        {% endfor %}
                    {% endif %}
                </div>
                {% endfor %}
                <button type="submit" class="btn-submit">Create Account</button>
            </form>
            <div class="auth-footer">
                Already have an account?<a href="{% url 'user_login' %}">Login</a>
                <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--border-color, #e8edf3); text-align: center;">
                    <a href="{% url 'developer_story' %}" style="color: var(--primary, #0a66c2); text-decoration: none; font-weight: 600; font-size: 13.5px; display: inline-block;">
                        🚀 Meet the Creator & Project Story
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
